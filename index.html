<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CWA x Windy 氣象觀測儀表板</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.4.0/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loading-overlay">
    <div class="spinner-container">
      <div class="double-bounce1"></div>
      <div class="double-bounce2"></div>
    </div>
    <p>正在載入中央氣象署觀測資料與地圖...</p>
  </div>

  <div id="windy"></div>

  <div class="dashboard-wrapper">

    <header class="glass-panel header-panel">
      <div class="header-logo">
        <i class="fa-solid fa-cloud-sun-rain brand-icon"></i>
        <div class="brand-text">
          <h1>CWA 臺灣氣象觀測儀表板</h1>
          <span class="sub-brand">Windy Map & Leaflet 整合視覺化</span>
        </div>
      </div>

      <div class="header-actions">
        <div class="status-badge live">
          <span class="pulse-dot"></span>
          <span>即時觀測</span>
        </div>

        <button id="refresh-btn" class="icon-btn" title="重新整理資料">
          <i class="fa-solid fa-arrows-rotate"></i>
        </button>
      </div>
    </header>

    <aside class="glass-panel sidebar-panel">

      <section class="dashboard-section">
        <h2 class="section-title">
          <i class="fa-solid fa-layer-group"></i> Layers
        </h2>

        <div class="filter-group">
          <label>切換觀測要素</label>
          <div class="toggle-btn-group" style="display: flex; gap: 6px; width: 100%;">
            <button id="btn-var-temp" class="active"
              style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--panel-border); background:rgba(59,130,246,0.15); color:var(--accent-color); cursor:pointer;">
              <i class="fa-solid fa-thermometer"></i> 氣溫
            </button>

            <button id="btn-var-rain"
              style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--panel-border); background:rgba(255,255,255,0.04); color:var(--text-primary); cursor:pointer;">
              <i class="fa-solid fa-cloud-showers-heavy"></i> 雨量
            </button>

            <button id="btn-var-rh"
              style="flex:1; padding:10px; border-radius:8px; border:1px solid var(--panel-border); background:rgba(255,255,255,0.04); color:var(--text-primary); cursor:pointer;">
              <i class="fa-solid fa-droplet"></i> 濕度
            </button>
          </div>
        </div>

        <div class="filter-group">
          <label for="map-style-select">地圖底圖</label>
          <div class="select-wrapper">
            <select id="map-style-select">
              <option value="osm">標準中文地圖</option>
              <option value="dark">時尚暗黑地圖</option>
              <option value="voyager">精緻彩色地圖</option>
              <option value="satellite">衛星影像地圖</option>
            </select>
            <i class="fa-solid fa-chevron-down select-arrow"></i>
          </div>
        </div>
      </section>

      <section class="dashboard-section">
        <h2 class="section-title">
          <i class="fa-solid fa-satellite-dish"></i> Observations
        </h2>

        <label class="checkbox-row">
          <input type="checkbox" id="show-cwa" checked>
          CWA observations
        </label>

        <label class="checkbox-row">
          <input type="checkbox" id="show-labels">
          Station labels
        </label>
      </section>

      <section class="dashboard-section">
        <h2 class="section-title">
          <i class="fa-solid fa-filter"></i> Filters
        </h2>

        <div class="search-box">
          <i class="fa-solid fa-location-dot search-icon"></i>
          <input type="text" id="search-input" placeholder="搜尋測站或縣市...">
          <button id="clear-search" class="clear-btn" style="display:none;">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="filter-group">
          <label for="county-select">County</label>
          <div class="select-wrapper">
            <select id="county-select">
              <option value="all">全部縣市</option>
            </select>
            <i class="fa-solid fa-chevron-down select-arrow"></i>
          </div>
        </div>
      </section>

      <section class="dashboard-section">
        <h2 class="section-title">
          <i class="fa-solid fa-chart-simple"></i> Statistics
        </h2>

        <div class="stats-grid">
          <div class="stat-card avg-temp">
            <div class="stat-icon">
              <i class="fa-solid fa-temperature-half"></i>
            </div>
            <div class="stat-info">
              <span class="stat-label">均溫</span>
              <span id="stat-avg" class="stat-value">--.-<span class="unit">°C</span></span>
            </div>
          </div>

          <div class="stat-card stations-count">
            <div class="stat-icon">
              <i class="fa-solid fa-satellite-dish"></i>
            </div>
            <div class="stat-info">
              <span class="stat-label">測站總數</span>
              <span id="stat-count" class="stat-value">--</span>
            </div>
          </div>
        </div>

        <div class="extreme-list">
          <div class="extreme-item hot-extreme">
            <div class="extreme-header">
              <span class="extreme-badge hot">最高溫</span>
              <span id="extreme-high-value" class="extreme-value">--.-°C</span>
            </div>
            <div class="extreme-body">
              <span id="extreme-high-station" class="extreme-station">載入中...</span>
              <span id="extreme-high-time" class="extreme-time">--:--</span>
            </div>
          </div>

          <div class="extreme-item cold-extreme">
            <div class="extreme-header">
              <span class="extreme-badge cold">最低溫</span>
              <span id="extreme-low-value" class="extreme-value">--.-°C</span>
            </div>
            <div class="extreme-body">
              <span id="extreme-low-station" class="extreme-station">載入中...</span>
              <span id="extreme-low-time" class="extreme-time">--:--</span>
            </div>
          </div>
        </div>
      </section>

      <section class="dashboard-section">
        <div id="legend-container" class="legend-panel">
          <h3 class="legend-title">溫度級距圖例</h3>
        </div>
      </section>

      <footer class="sidebar-footer">
        <p>觀測時間：<span id="update-time">--:--</span></p>
        <p>地圖模式：<span id="map-mode-indicator">載入中...</span></p>
      </footer>

    </aside>
  </div>

  <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
  <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
  <script src="app.js"></script>

</body>

</html>
